baseURL: "https://icysamon.com/"
title: icysamon
copyright: "© icysamon"
theme: [PaperMod]
languageCode: ja

permalinks:
    post: /post/:slug/
    page: /:slug/

languages:
  ja:
    languageName: "Japanese"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

params:
  ShowPostNavLinks: false
  assets:
    disableHLJS: true
    disableFingerprinting: true
    favicon: "/favicon.ico"
    favicon16x16: "/favicon.ico"
    favicon32x32: "/favicon.ico"
    apple_touch_icon: "/favicon.ico"
    safari_pinned_tab: "/favicon.ico"
  profileMode:
    enabled: true
    title: # optional default will be site title
    subtitle: "電子工作｜ゲーム制作｜作曲"
    imageUrl: "https://image.icysamon.com/avatar/000.png" # optional
    imageTitle: # optional
    imageWidth: 150 # custom size
    imageHeight: 150 # custom size
    buttons:
      - name: Blog
        url: "https://blog.icysamon.com/"

  socialIcons: # optional
    - name: "bluesky"
      url: "https://bsky.app/profile/icysamon.com"
    - name: "github"
      url: "https://github.com/icysamon"
    - name: "applemusic"
      url: "https://music.apple.com/jp/artist/icysamon/1808762015"
    - name: "spotify"
      url: "https://open.spotify.com/intl-ja/artist/7tk5ryKLzZdGvABO1H0LCx"
    - name: "email"
      url: "mailto:me@icysamon.com"

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10